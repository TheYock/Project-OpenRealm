<!DOCTYPE html>
<html>
    <head>
        <title>OpenRealm</title>

        <style>
            body{
                margin: 0;
                background: #1e1e1e;
                color: white;
                font-family: Arial, sans-serif;
                text-align: center;
            }

            #gameContainer{
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                margin-top: 20px;
            }

            canvas{
                background: #2b2b2b;
                border: 2px solid white;
            }

            #chatContainer{
                width: 300px;
                height: 600px;
                display: flex;
                flex-direction: column;
                border: 2px solid white;
                background: #252525;
            }

            #chatMessages{
                flex: 1;
                overflow-y: auto;
                padding: 10px;
                text-align: left;
            }

            #chatInputContainer{
                display: flex;
                border-top: 1px solid #444;
            }

            #chatInput{
                flex: 1;
                padding: 10px;
                border: none;
                outline: none;
                background: #1a1a1a;
                color: white;
            }

            #sendButton{
                padding: 10px 15px;
                border: none;
                background: #4caf50;
                color: white;
                cursor: pointer;
            }

            #sendButton:hover{
                background: #45a049;
            }

            .chatMessage{
                margin-bottom: 8px;
                word-wrap: break-word;
            }

        </style>
    </head>
    <body>

        <h1>Welcome to OpenRealm!</h1>

        <div id="gameContainer">
            <canvas id="gameCanvas" width="800" height="600"></canvas>

            <div id="chatContainer">
                <div id="chatMessages"></div>
                <div id="chatInputContainer">
                    <input type="text" id="chatInput" placeholder="Type a message..." maxlength="200"/>
                    <button id="sendButton">Send</button>
                </div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="/game.js"></script>
    </body>
</html>
